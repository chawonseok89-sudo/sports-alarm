name: Daily Sports Alarm

on:
  schedule:
    - cron: '0 13 * * *' # UTC 기준 13시는 한국 시간 밤 10시(22시)입니다.
  workflow_dispatch: # 수동으로도 실행해볼 수 있게 하는 버튼입니다.

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install python-telegram-bot
      - name: Run script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot.py
